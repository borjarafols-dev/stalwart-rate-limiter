# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    webhook_secret: '%env(WEBHOOK_SECRET)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    OpenTelemetry\API\Logs\LoggerProviderInterface:
        factory: ['OpenTelemetry\API\Globals', 'loggerProvider']

    OpenTelemetry\Contrib\Logs\Monolog\Handler:
        arguments:
            $loggerProvider: '@OpenTelemetry\API\Logs\LoggerProviderInterface'
            $level: !php/const Monolog\Level::Info

    App\Contract\StalwartApiClientInterface:
        alias: App\Service\StalwartApiClient

    App\Service\StalwartApiClient:
        arguments:
            $httpClient: '@stalwart.client'

    App\Contract\ProviderMapperInterface:
        alias: App\Service\ProviderMapper

    App\Contract\RateLevelEngineInterface:
        alias: App\Service\RateLevelEngine

    App\Contract\ProviderStateRepositoryInterface:
        alias: App\Repository\ProviderStateRepository

    App\Contract\LimitApplierInterface:
        alias: App\Service\NullLimitApplier

when@test:
    services:
        App\Contract\StalwartApiClientInterface:
            alias: App\Tests\Fake\InMemoryStalwartApiClient
            public: true

        App\Tests\Fake\InMemoryStalwartApiClient:
            public: true

        App\Contract\ProviderMapperInterface:
            alias: App\Tests\Fake\InMemoryProviderMapper
            public: true

        App\Tests\Fake\InMemoryProviderMapper:
            public: true

        App\Contract\ProviderStateRepositoryInterface:
            alias: App\Tests\Fake\InMemoryProviderStateRepository
            public: true

        App\Tests\Fake\InMemoryProviderStateRepository:
            public: true

        App\Contract\LimitApplierInterface:
            alias: App\Tests\Fake\InMemoryLimitApplier
            public: true

        App\Tests\Fake\InMemoryLimitApplier:
            public: true
