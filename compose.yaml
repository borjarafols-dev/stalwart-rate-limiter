services:
  app:
    container_name: app
    build:
      context: .
      target: dev
    ports:
      - "8080:8080"
    environment:
      APP_ENV: dev
      APP_SECRET: dev-secret-not-for-production
      DATABASE_URL: postgresql://ratelimiter:changeme@database:5432/ratelimiter?serverVersion=16&charset=utf8
      STALWART_API_URL: http://stalwart:8443
      WEBHOOK_SECRET: change-me
      OTEL_PHP_TRACES_PROCESSOR: simple
    volumes:
      - ./:/app
      - /app/vendor
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ratelimiter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_USER: ${POSTGRES_USER:-ratelimiter}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-ratelimiter}", "-U", "${POSTGRES_USER:-ratelimiter}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw

volumes:
  database_data:
